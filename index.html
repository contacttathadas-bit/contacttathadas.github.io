<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tathagata Das — Graphic Designer</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* CSS Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #080808; --text: #F0EDE6; --accent: #E8C547; --border: rgba(240,237,230,0.08); }
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow-x: hidden; cursor: none; }

/* Custom Cursor */
.cursor { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
.cursor-follower { width: 36px; height: 36px; border: 1px solid var(--accent); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998; transition: width 0.1s, height 0.1s; mix-blend-mode: difference; }

/* Navigation */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 3.5rem; background: rgba(8,8,8,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; color: var(--text); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a { font-size: 0.75rem; text-transform: uppercase; color: #888580; text-decoration: none; }

/* Hero Section */
.hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 3.5rem; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(4rem, 9vw, 9rem); font-weight: 700; line-height: 0.95; }
.name-last { color: transparent; -webkit-text-stroke: 1px var(--accent); font-style: italic; }

/* Placeholder Styling */
.work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; padding: 4rem 3.5rem; }
.work-card { background: #111; padding: 2rem; border: 1px solid var(--border); text-align: center; color: var(--text); }

/* Responsive adjustments */
@media (max-width: 900px) { .cursor, .cursor-follower { display: none; } body { cursor: auto; } }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<nav>
  <a href="#" class="nav-logo">TD<span>.</span></a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>
    <span class="name-first">Tathagata</span>
    <span class="name-last">Das</span>
  </h1>
</section>

<section class="work-grid" id="work">
  <div class="work-card">Project 1</div>
  <div class="work-card">Project 2</div>
  <div class="work-card">Project 3</div>
</section>

<script>
// Error-proof cursor script
const cursor = document.getElementById('cursor');
const follower = document.getElementById('cursorFollower');

document.addEventListener('mousemove', e => {
  if(!cursor || !follower) return;
  cursor.style.transform = `translate(${e.clientX - 5}px, ${e.clientY - 5}px)`;
  follower.style.transform = `translate(${e.clientX - 18}px, ${e.clientY - 18}px)`;
});
</script>
</body>
</html>
